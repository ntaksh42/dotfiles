# starship.toml - ブランチ・作業状況を一目で把握する設定 (通常フォント対応)
#
# 配置先: ~/.config/starship.toml
# 管理元: このリポジトリの app-settings/starship/starship.toml
#   反映方法: Copy-Item app-settings\starship\starship.toml $HOME\.config\starship.toml
#
# 記号はすべて ASCII なので Nerd Font 不要。どのフォントでも崩れない。
# Nerd Font を使う場合は各記号をグリフに置き換えると更に見やすくなる
# (例: git_branch.symbol = " ", modified = "✚${count}" など)。

add_newline = false
format = "$directory$git_branch$git_status$git_state$character"

[directory]
truncation_length = 3        # 深い階層は末尾 3 つに省略 (ブランチ情報を右に押し出さない)
truncate_to_repo = true      # git リポジトリ内はリポジトリルートからの相対パス
style = "bold cyan"
format = "[$path]($style) "
read_only = " [ro]"

[git_branch]
symbol = ""                  # グリフを使わない
style = "bold purple"
format = "[$branch]($style) "

# 作業状況: 種類ごとにカウント付きラベルで色分け表示。
#   +N ステージ済み / !N 変更 / ?N 未追跡 / xN 削除 / rN リネーム
#   *N stash / =N 競合 / >N ahead / <N behind
[git_status]
style = "bold yellow"
conflicted = "[=${count}](bold red) "
ahead      = "[>${count}](bold green) "
behind     = "[<${count}](bold red) "
diverged   = "[>${ahead_count}<${behind_count}](bold red) "
untracked  = "[?${count}](blue) "
stashed    = "[*${count}](cyan) "
modified   = "[!${count}](yellow) "
staged     = "[+${count}](green) "
renamed    = "[r${count}](yellow) "
deleted    = "[x${count}](red) "
format = "([$all_status$ahead_behind]($style))"

# rebase / merge / cherry-pick / bisect の途中状態を表示 (進捗付き)
[git_state]
style = "bold red"
format = '\([$state( $progress_current/$progress_total)]($style)\) '

[character]
success_symbol = "[>](bold green)"
error_symbol   = "[>](bold red)"
