# starship.toml - Nerd Font 不要のシンプル設定
# 通常フォントでも崩れないよう、グリフ(Nerd Font)を使わずフルパスを表示する。
# 配置先: ~/.config/starship.toml

add_newline = false
format = "$directory$git_branch$git_status$character"

[directory]
truncation_length = 0          # フルパス表示 (CWD を省略しない)
truncate_to_repo = false
style = "bold cyan"
format = "[$path]($style) "
read_only = " [ro]"

[git_branch]
symbol = ""                    # グリフを使わない
style = "bold magenta"
format = "[on ($branch)]($style) "

[git_status]
style = "bold yellow"
format = "([$all_status$ahead_behind]($style) )"

[character]
success_symbol = "[>](bold green)"
error_symbol   = "[>](bold red)"
